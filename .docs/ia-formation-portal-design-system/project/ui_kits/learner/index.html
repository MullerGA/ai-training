<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Magora — Learner UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Icons.jsx"></script>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="screens/Dashboard.jsx"></script>
  <script type="text/babel" src="screens/Catalog.jsx"></script>
  <script type="text/babel" src="screens/Path.jsx"></script>
  <script type="text/babel" src="screens/Lesson.jsx"></script>
  <script type="text/babel" src="screens/Exercise.jsx"></script>
  <script type="text/babel" src="screens/Progress.jsx"></script>
  <script type="text/babel" src="screens/Onboarding.jsx"></script>

  <script type="text/babel">
    const SCREENS = [
      { id: 'dashboard',  label: 'Dashboard',    icon: 'home',    comp: () => <Dashboard/> },
      { id: 'catalog',    label: 'Catalogue',    icon: 'compass', comp: () => <Catalog/> },
      { id: 'path',       label: 'Parcours',     icon: 'layers',  comp: () => <Path/> },
      { id: 'lesson',     label: 'Leçon',        icon: 'play',    comp: () => <Lesson/> },
      { id: 'exercise',   label: 'Exercice',     icon: 'target',  comp: () => <Exercise/> },
      { id: 'progress',   label: 'Progression',  icon: 'chart',   comp: () => <Progress2/> },
      { id: 'onboarding', label: 'Onboarding',   icon: 'sparkles',comp: () => <Onboarding/> },
    ];

    function App() {
      const [cur, setCur] = React.useState(() => localStorage.getItem('magora.screen') || 'dashboard');
      React.useEffect(() => { localStorage.setItem('magora.screen', cur); }, [cur]);
      const s = SCREENS.find(x => x.id === cur) || SCREENS[0];
      return (
        <div className="app" data-screen-label={s.label}>
          <Navbar/>
          <div className="screen">
            <div className="screen-nav">
              <div className="nav-title">Parcours learner</div>
              {SCREENS.map(sc => {
                const IC = Icon[sc.icon];
                return (
                  <div key={sc.id} className={`nav-item ${sc.id === cur ? 'active' : ''}`} onClick={() => setCur(sc.id)}>
                    <IC/> {sc.label}
                  </div>
                );
              })}
              <div className="nav-title" style={{ marginTop: 28 }}>Aide</div>
              <div className="nav-item"><Icon.messageQ/> Questions ?</div>
              <div className="nav-item"><Icon.settings/> Paramètres</div>
            </div>
            <div className="screen-content">
              <div style={{ padding: '32px 0' }}>{s.comp()}</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
