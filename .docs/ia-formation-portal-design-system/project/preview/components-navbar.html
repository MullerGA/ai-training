<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:#fff; font-family: var(--font-sans); }
  .navbar { height: 56px; background: #0f172a; display:flex; align-items:center; justify-content:space-between; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .brand { display:flex; align-items:center; gap: 10px; }
  .badge { width: 30px; height: 30px; border-radius: 7px; background: linear-gradient(135deg,#3b82f6 0%,#4f46e5 100%); color: white; font-weight: 700; font-size: 12px; display:inline-flex; align-items:center; justify-content:center; letter-spacing: 0.02em; }
  .logo { height: 18px; filter: brightness(0) invert(1); opacity: 0.95; }
  .actions { display:flex; gap: 8px; align-items:center; }
  button { font-family: inherit; font-size: 13px; height: 34px; padding: 0 14px; border-radius: 6px; border: 0; cursor: pointer; color: #cbd5e1; background: transparent; display:inline-flex; align-items: center; gap: 8px; }
  button:hover { color: white; background: rgba(255,255,255,0.05); }
  .cta { background: linear-gradient(135deg,#3b82f6 0%,#4f46e5 100%); color: white; }
  .cta:hover { opacity: 0.9; background: linear-gradient(135deg,#3b82f6 0%,#4f46e5 100%); }
  svg { width: 16px; height: 16px; stroke-width: 2; }
  .label { padding: 12px 20px; color: #64748b; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
</style>
</head>
<body>
  <div class="navbar">
    <div class="brand">
      <div class="badge">AI</div>
      <img class="logo" src="../assets/magora-logo-white.svg" alt="Magora"/>
    </div>
    <div class="actions">
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        Support de formation
      </button>
      <button class="cta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/><path d="M9.1 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        Questions ?
      </button>
    </div>
  </div>
  <div class="label">Navbar fixe · h-16 · z-50 · fond slate-900</div>
</body>
</html>
