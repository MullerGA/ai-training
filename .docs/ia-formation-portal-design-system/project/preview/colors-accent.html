<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
  .swatch { border-radius: 8px; aspect-ratio: 1; border: 1px solid rgba(0,0,0,0.05); }
  .label { font-size: 10px; color: var(--slate-500); font-family: var(--font-mono); margin-top: 6px; text-align: center; }
  .title { font-size: 12px; font-weight: 600; color: var(--slate-700); margin: 0 0 8px 0; letter-spacing: 0.02em; text-transform: uppercase; }
  .row + .row { margin-top: 14px; }
  .col { display: flex; flex-direction: column; }
  .gradbar { height: 36px; border-radius: 8px; background: linear-gradient(135deg,#3b82f6 0%,#4f46e5 100%); display:flex; align-items:center; justify-content:center; color:white; font-weight:600; font-size:12px; letter-spacing:0.04em; margin-top: 10px; }
</style>
</head>
<body>
<div class="row">
  <div class="title">Blue (primary)</div>
  <div class="grid">
    <div class="col"><div class="swatch" style="background:#eff6ff"></div><div class="label">50</div></div>
    <div class="col"><div class="swatch" style="background:#dbeafe"></div><div class="label">100</div></div>
    <div class="col"><div class="swatch" style="background:#bfdbfe"></div><div class="label">200</div></div>
    <div class="col"><div class="swatch" style="background:#60a5fa"></div><div class="label">400</div></div>
    <div class="col"><div class="swatch" style="background:#3b82f6;outline:2px solid #3b82f6;outline-offset:2px"></div><div class="label">500★</div></div>
    <div class="col"><div class="swatch" style="background:#2563eb"></div><div class="label">600</div></div>
    <div class="col"><div class="swatch" style="background:#1d4ed8"></div><div class="label">700</div></div>
    <div class="col"><div class="swatch" style="background:#6366f1"></div><div class="label">ind-500</div></div>
    <div class="col"><div class="swatch" style="background:#4f46e5"></div><div class="label">ind-600</div></div>
  </div>
  <div class="gradbar">gradient blue-500 → indigo-600 · CTA principal</div>
</div>
</body>
</html>
