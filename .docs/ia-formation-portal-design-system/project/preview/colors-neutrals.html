<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(11, 1fr); gap: 8px; }
  .swatch { border-radius: 8px; aspect-ratio: 1; border: 1px solid rgba(0,0,0,0.05); position: relative; }
  .label { font-size: 10px; color: var(--slate-500); font-family: var(--font-mono); margin-top: 6px; text-align: center; }
  .title { font-size: 12px; font-weight: 600; color: var(--slate-700); margin: 0 0 8px 0; letter-spacing: 0.02em; text-transform: uppercase; }
  .section + .section { margin-top: 18px; }
  .col { display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="section">
  <div class="title">Slate — neutres (11 steps)</div>
  <div class="grid">
    <div class="col"><div class="swatch" style="background:#f8fafc"></div><div class="label">50</div></div>
    <div class="col"><div class="swatch" style="background:#f1f5f9"></div><div class="label">100</div></div>
    <div class="col"><div class="swatch" style="background:#e2e8f0"></div><div class="label">200</div></div>
    <div class="col"><div class="swatch" style="background:#cbd5e1"></div><div class="label">300</div></div>
    <div class="col"><div class="swatch" style="background:#94a3b8"></div><div class="label">400</div></div>
    <div class="col"><div class="swatch" style="background:#64748b"></div><div class="label">500</div></div>
    <div class="col"><div class="swatch" style="background:#475569"></div><div class="label">600</div></div>
    <div class="col"><div class="swatch" style="background:#334155"></div><div class="label">700</div></div>
    <div class="col"><div class="swatch" style="background:#1e293b"></div><div class="label">800</div></div>
    <div class="col"><div class="swatch" style="background:#0f172a"></div><div class="label">900</div></div>
    <div class="col"><div class="swatch" style="background:#020617"></div><div class="label">950</div></div>
  </div>
</div>
</body>
</html>
