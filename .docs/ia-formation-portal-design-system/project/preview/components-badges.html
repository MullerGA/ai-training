<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .row + .row { margin-top: 14px; }
  .badge { display:inline-flex; align-items:center; gap: 4px; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; border: 1px solid transparent; line-height: 1.5; }
  .b-default { background:#0f172a; color:white; }
  .b-secondary { background:#f1f5f9; color:#0f172a; }
  .b-outline { background:transparent; color:#0f172a; border-color:#e2e8f0; }
  .b-destructive { background:#ef4444; color:white; }
  .b-success { background:#dcfce7; color:#15803d; }
  .b-warning { background:#fef3c7; color:#a16207; }
  .b-info { background:#dbeafe; color:#1d4ed8; }
  .title { font-size: 11px; font-weight: 600; color: #64748b; margin: 0 0 8px 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .dot { width: 6px; height: 6px; border-radius: 9999px; background: currentColor; display: inline-block; }
</style>
</head>
<body>
  <div class="title">Base variants (shadcn)</div>
  <div class="row">
    <span class="badge b-default">Default</span>
    <span class="badge b-secondary">Secondary</span>
    <span class="badge b-outline">Outline</span>
    <span class="badge b-destructive">Destructive</span>
  </div>
  <div class="title" style="margin-top:18px">Usage produit</div>
  <div class="row">
    <span class="badge b-success"><span class="dot"></span>Terminé</span>
    <span class="badge b-info"><span class="dot"></span>En cours</span>
    <span class="badge b-warning"><span class="dot"></span>À reprendre</span>
    <span class="badge b-secondary">Nouveau</span>
    <span class="badge b-outline">12 min</span>
    <span class="badge b-outline">Module 3/8</span>
  </div>
</body>
</html>
