<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .block + .block { margin-top: 18px; }
  .lbl { display:flex; justify-content: space-between; font-size:13px; font-weight:500; color:#0f172a; margin-bottom:8px; }
  .bar { width:100%; height: 8px; background:#e2e8f0; border-radius: 9999px; overflow: hidden; }
  .fill { height: 100%; background: #2563eb; border-radius: 9999px; }
  .fill-grad { background: linear-gradient(90deg,#3b82f6 0%,#4f46e5 100%); }
  .steps { display:flex; align-items:center; gap: 4px; }
  .step { flex:1; height: 4px; background: #e2e8f0; border-radius: 9999px; }
  .step.done { background: #22c55e; }
  .step.cur { background: #3b82f6; }
  .stepn { display:flex; align-items:center; gap: 8px; }
  .circ { width: 28px; height: 28px; border-radius: 9999px; display:inline-flex; align-items:center; justify-content:center; font-size: 12px; font-weight: 600; border: 1px solid #e2e8f0; color: #64748b; background: white; }
  .circ.done { background: #22c55e; color: white; border-color: #22c55e; }
  .circ.cur { background: #3b82f6; color: white; border-color: #3b82f6; }
  .line { flex:1; height: 2px; background: #e2e8f0; }
  .line.done { background: #22c55e; }
  svg { width: 14px; height: 14px; stroke-width: 3; }
</style>
</head>
<body>
  <div class="block">
    <div class="lbl"><span>Module 3 — Prompting</span><span>65%</span></div>
    <div class="bar"><div class="fill" style="width:65%"></div></div>
  </div>
  <div class="block">
    <div class="lbl"><span>Parcours global</span><span>40%</span></div>
    <div class="bar"><div class="fill fill-grad" style="width:40%"></div></div>
  </div>
  <div class="block">
    <div class="lbl"><span>Leçons (8)</span><span>5/8</span></div>
    <div class="steps">
      <div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step done"></div><div class="step cur"></div><div class="step"></div><div class="step"></div>
    </div>
  </div>
  <div class="block">
    <div class="stepn">
      <div class="circ done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="line done"></div>
      <div class="circ done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="line done"></div>
      <div class="circ cur">3</div>
      <div class="line"></div>
      <div class="circ">4</div>
    </div>
  </div>
</body>
</html>
