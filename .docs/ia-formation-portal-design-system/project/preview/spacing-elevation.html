<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:#fff; font-family: var(--font-sans); display:flex; gap: 20px; justify-content: space-between; }
  .cell { flex:1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 64px; background: white; border-radius: 8px; border: 1px solid var(--slate-100); }
  .name { font-size: 11px; color: var(--slate-700); font-weight: 600; font-family: var(--font-mono); }
  .use { font-size: 10px; color: var(--slate-500); }
  .b1 { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
  .b2 { box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08), 0 1px 2px -1px rgb(0 0 0 / 0.06); }
  .b3 { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06); }
  .b4 { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.05); }
</style>
</head>
<body>
  <div class="cell"><div class="box b1"></div><div class="name">shadow-sm</div><div class="use">cards · inputs</div></div>
  <div class="cell"><div class="box b2"></div><div class="name">shadow</div><div class="use">default</div></div>
  <div class="cell"><div class="box b3"></div><div class="name">shadow-md</div><div class="use">hover state</div></div>
  <div class="cell"><div class="box b4"></div><div class="name">shadow-lg</div><div class="use">popover · dialog</div></div>
</body>
</html>
