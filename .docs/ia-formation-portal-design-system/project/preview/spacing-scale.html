<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; align-items:end; gap: 14px; padding-bottom: 16px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--blue-500); border-radius: 2px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--slate-500); }
  .title { font-size: 12px; font-weight: 600; color: var(--slate-700); margin: 0 0 8px 0; letter-spacing: 0.02em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="title">Spacing scale (base 4px)</div>
  <div class="row">
    <div class="cell"><div class="bar" style="width:4px;height:4px"></div><div class="lbl">1 · 4</div></div>
    <div class="cell"><div class="bar" style="width:8px;height:8px"></div><div class="lbl">2 · 8</div></div>
    <div class="cell"><div class="bar" style="width:12px;height:12px"></div><div class="lbl">3 · 12</div></div>
    <div class="cell"><div class="bar" style="width:16px;height:16px"></div><div class="lbl">4 · 16</div></div>
    <div class="cell"><div class="bar" style="width:20px;height:20px"></div><div class="lbl">5 · 20</div></div>
    <div class="cell"><div class="bar" style="width:24px;height:24px"></div><div class="lbl">6 · 24</div></div>
    <div class="cell"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">8 · 32</div></div>
    <div class="cell"><div class="bar" style="width:40px;height:40px"></div><div class="lbl">10 · 40</div></div>
    <div class="cell"><div class="bar" style="width:48px;height:48px"></div><div class="lbl">12 · 48</div></div>
    <div class="cell"><div class="bar" style="width:64px;height:64px"></div><div class="lbl">16 · 64</div></div>
  </div>
</body>
</html>
