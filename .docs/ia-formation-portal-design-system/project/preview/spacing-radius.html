<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); display:flex; gap:18px; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .shape { width: 72px; height: 56px; background: var(--slate-100); border: 1px solid var(--slate-200); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--slate-500); }
  .name { font-size: 11px; color: var(--slate-700); font-weight: 500; }
</style>
</head>
<body>
  <div class="cell"><div class="shape" style="border-radius:4px"></div><div class="name">sm</div><div class="lbl">4px</div></div>
  <div class="cell"><div class="shape" style="border-radius:6px"></div><div class="name">md</div><div class="lbl">6px</div></div>
  <div class="cell"><div class="shape" style="border-radius:8px"></div><div class="name">lg★</div><div class="lbl">8px default</div></div>
  <div class="cell"><div class="shape" style="border-radius:12px"></div><div class="name">xl</div><div class="lbl">12px</div></div>
  <div class="cell"><div class="shape" style="border-radius:16px"></div><div class="name">2xl</div><div class="lbl">16px</div></div>
  <div class="cell"><div class="shape" style="border-radius:9999px"></div><div class="name">full</div><div class="lbl">pill · avatars · badges</div></div>
</body>
</html>
