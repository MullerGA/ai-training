<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background:white; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 1px 2px rgb(0 0 0 / 0.05); overflow: hidden; }
  .ch { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
  .ct { padding: 14px 16px; }
  .t { font-size: 15px; font-weight: 600; color: #0f172a; margin: 0; }
  .d { font-size: 12px; color: #64748b; margin: 2px 0 0 0; }
  .p { font-size: 13px; color: #475569; line-height: 1.6; margin: 0; }
  .row { display:flex; align-items:center; gap: 12px; }
  .num { width: 40px; height: 40px; border-radius: 9999px; background: #2563eb; color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink:0; }
  .meta { display:flex; gap: 10px; margin-top: 12px; font-size: 11px; color: #64748b; }
</style>
</head>
<body>
  <div class="card">
    <div class="ch"><div class="t">Introduction aux LLM</div><div class="d">Module 1 · 4 leçons</div></div>
    <div class="ct"><div class="p">Les concepts fondamentaux des LLM et leurs applications concrètes en entreprise.</div><div class="meta"><span>45 min</span><span>·</span><span>3/4 terminées</span></div></div>
  </div>
  <div class="card">
    <div class="ct">
      <div class="row">
        <div class="num">1</div>
        <div><div class="t">Anatomie d'un LLM</div><div class="d" style="margin-top:2px">Plongée dans la structure interne</div></div>
      </div>
    </div>
  </div>
</body>
</html>
