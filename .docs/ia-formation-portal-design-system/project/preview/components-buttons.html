<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .row + .row { margin-top: 14px; }
  button { font-family: inherit; font-size: 14px; font-weight: 500; line-height: 1; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 200ms ease; padding: 0 16px; height: 36px; border: 1px solid transparent; }
  .btn-primary { background: #0f172a; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .btn-primary:hover { background: #1e293b; }
  .btn-gradient { background: linear-gradient(135deg,#3b82f6 0%,#4f46e5 100%); color: white; border: 0; }
  .btn-gradient:hover { opacity: .9; }
  .btn-outline { background: white; border-color: #e2e8f0; color: #0f172a; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .btn-outline:hover { background: #f1f5f9; }
  .btn-ghost { background: transparent; color: #334155; }
  .btn-ghost:hover { background: #f1f5f9; }
  .btn-secondary { background: #f1f5f9; color: #0f172a; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-destructive { background: #ef4444; color: white; }
  .btn-destructive:hover { background: #dc2626; }
  .btn-link { background: transparent; color: #2563eb; padding: 0; height: auto; }
  .btn-link:hover { text-decoration: underline; }
  .btn-sm { height: 32px; padding: 0 12px; font-size: 12px; border-radius: 6px; }
  .btn-lg { height: 40px; padding: 0 32px; border-radius: 6px; }
  .btn-icon { width: 36px; padding: 0; justify-content: center; }
  .title { font-size: 11px; font-weight: 600; color: #64748b; margin: 0 0 8px 0; letter-spacing: 0.04em; text-transform: uppercase; }
  svg { width: 16px; height: 16px; stroke-width: 2; }
</style>
</head>
<body>
  <div class="title">Variants</div>
  <div class="row">
    <button class="btn-primary">Default</button>
    <button class="btn-gradient">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m21 15-6-6-6 6"/><path d="M15 3v12"/></svg>
      Commencer
    </button>
    <button class="btn-outline">Outline</button>
    <button class="btn-secondary">Secondary</button>
    <button class="btn-ghost">Ghost</button>
    <button class="btn-destructive">Destructive</button>
    <a class="btn-link">En savoir plus →</a>
  </div>
  <div class="title" style="margin-top:18px">Sizes</div>
  <div class="row">
    <button class="btn-primary btn-sm">Small</button>
    <button class="btn-primary">Default</button>
    <button class="btn-primary btn-lg">Large</button>
    <button class="btn-outline btn-icon" aria-label="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
    </button>
  </div>
</body>
</html>
