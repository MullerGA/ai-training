<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .title { font-size: 11px; font-weight: 600; color: #64748b; margin: 0 0 12px 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .row { display:flex; gap: 10px; }
  .tile { flex:1; display:flex; align-items:center; gap: 12px; padding: 12px 14px; border-radius: 8px; border: 1px solid; background: white; }
  .sw { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
  .name { font-size: 13px; font-weight: 600; color: var(--slate-900); line-height: 1.2; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--slate-500); margin-top: 2px; }
  .use { font-size: 11px; color: var(--slate-500); margin-left: auto; text-align: right; }

  .t-info    { border-color:#dbeafe; }
  .t-success { border-color:#dcfce7; }
  .t-warn    { border-color:#fde68a; }
  .t-destr   { border-color:#fecaca; }
</style>
</head>
<body>
  <div class="title">Couleurs sémantiques</div>
  <div class="row" style="margin-bottom:10px">
    <div class="tile t-info">
      <div class="sw" style="background:#3b82f6"></div>
      <div><div class="name">Info</div><div class="hex">#3b82f6</div></div>
      <div class="use">Actions · focus</div>
    </div>
    <div class="tile t-success">
      <div class="sw" style="background:#22c55e"></div>
      <div><div class="name">Success</div><div class="hex">#22c55e</div></div>
      <div class="use">Validation</div>
    </div>
  </div>
  <div class="row">
    <div class="tile t-warn">
      <div class="sw" style="background:#f59e0b"></div>
      <div><div class="name">Warning</div><div class="hex">#f59e0b</div></div>
      <div class="use">Indices</div>
    </div>
    <div class="tile t-destr">
      <div class="sw" style="background:#ef4444"></div>
      <div><div class="name">Destructive</div><div class="hex">#ef4444</div></div>
      <div class="use">Supprimer</div>
    </div>
  </div>
</body>
</html>
